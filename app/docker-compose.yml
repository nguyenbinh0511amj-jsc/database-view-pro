version: "3.8"

services:
  mongodb:
    image: mongo:7.0
    container_name: tourpro-mongodb
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password
      MONGO_INITDB_DATABASE: database-view-pro
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - tourpro-network

  mongo-express:
    image: mongo-express:1.0.0
    container_name: tourpro-mongo-express
    restart: always
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: password
      ME_CONFIG_MONGODB_URL: mongodb://admin:password@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - tourpro-network

volumes:
  mongodb_data:
  mongodb_config:

networks:
  tourpro-network:
    driver: bridge
